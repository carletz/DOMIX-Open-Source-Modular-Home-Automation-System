i2c:
  - id: bus_module_main       # Main I2C bus for communication TCA9548A, fixed by design, do not change 
    sda: GPIO08
    scl: GPIO18
    scan: true
    frequency: 100kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

  - id: bus_screen
    sda: GPIO04
    scl: GPIO05
    scan: true
    frequency: 100kHz
    sda_pullup_enabled: False
    scl_pullup_enabled: False

tca9548a:
  - address: 0x70             # I2C address of TCA9548A, fixed by design, do not change
    id: i2c_switch
    i2c_id: bus_module_main
    channels:
      - bus_id: bus_module_0
        channel: 0
      - bus_id: bus_module_1
        channel: 1
      - bus_id: bus_module_2
        channel: 2    
      - bus_id: bus_module_3
        channel: 3    
      - bus_id: bus_module_4
        channel: 4    
      - bus_id: bus_module_5
        channel: 5
      - bus_id: bus_module_6
        channel: 6    
      - bus_id: bus_module_7    # Bus for upper board buttons DON'T CHANGE!
        channel: 7        