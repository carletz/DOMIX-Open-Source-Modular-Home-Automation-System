#
# M6 MODULE BASIC DESIGN FOR BASIC FUNCTIONS
#
# Adapt the configurations, names and other to your needs
#
# ============================================================================
external_components:
  - source:
      type: git
      url: https://github.com/hzkincony/esphome-zmpt101b
    refresh: 1min

# PCA9554A I/O Expander (for multiplexing of CD74HC4067 chip channel S0-S3)
pca9554:
  - id: domix_m6${m6_number_1}_busi2c
    address: ${m6_i2c_1} 
    i2c_id: ${m6_i2c_id}              # Bus for comunication with DOMIX M1 module    

# ADS1115 ADC
ads1115:
  - id: domix_m6${m6_number_1}_ads1115_hub
    address: ${m6_ads_1} 
    continuous_mode: off
    i2c_id: ${m6_i2c_id}              # Bus for comunication with DOMIX M1 module

# Configurazione multiplexer CD74HC4067
cd74hc4067:
  - id: m6${m6_number_1}_mux
    delay: 15ms
    pin_s0:
      pca9554: domix_m6${m6_number_1}_busi2c
      number: 3
      mode: OUTPUT
      inverted: false
    pin_s1:
      pca9554: domix_m6${m6_number_1}_busi2c
      number: 2
      mode: OUTPUT
      inverted: false
    pin_s2:
      pca9554: domix_m6${m6_number_1}_busi2c
      number: 1
      mode: OUTPUT
      inverted: false
    pin_s3:
      pca9554: domix_m6${m6_number_1}_busi2c
      number: 0
      mode: OUTPUT
      inverted: false

sensor:
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 1.024
    id: domix_m6${m6_number_1}_voltage
    ads1115_id: domix_m6${m6_number_1}_ads1115_hub
    internal: true
    update_interval: never

  - platform: zmpt101b
    name: "${m6_voltage_description}"
    sensor: domix_m6${m6_number_1}_voltage
    id: voltage${m6_number_1}
    sensitivity: 538                    # new_sensitivity = current_sensitivity × (actual_voltage / measured_voltage)
    unit_of_measurement: V
    accuracy_decimals: 1
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${m6_name}${m6_number_1}/${m6_voltage_description}/state
    web_server:
      sorting_group_id: domix_m6_web
      sorting_weight: 1

  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 1.024
    id: domix_m6${m6_number_1}_clamp_ch0
    ads1115_id: domix_m6${m6_number_1}_ads1115_hub
