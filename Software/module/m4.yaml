            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m4${m4_number_1}_channel_4
            else:
              - switch.turn_off: m4${m4_number_1}_channel_4
    - topic: ${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 5/command
