# ──────────────────────────────────────────────────────────────
#  Read data from DOMIX S sensor module
#  Add more module at your use adding blocks and changing address
# ──────────────────────────────────────────────────────────────

modbus_controller:
  - id: ${s_controller_id}
    modbus_id: modbus_bus
    address: ${s_modbus_addr}
    update_interval: 5s

web_server:
  sorting_groups:
    - id: ${s_name}
      name: "${s_name_upper} sensor"
      sorting_weight: ${sorting_weight}

mqtt:
  on_message:
    # ══════════════════════════════════════════════════════════════
    #  Receives IR commands over MQTT and forwards them to RP2040 
    #  sensors via Modbus RTU (RS485).
    #
    #  Holding register convention 0 on each slave:
    #    0        → idle (auto-reset after execution)
    #    1–999    → digital channel
    #    1001     → MUTE
    #    1002     → GUIDE
    #    1003     → BACK
    #    1004     → CHANNEL FORWARD
    #    1005     → CHANNEL BACK
    #    1006     → ON / OFF (toggle)
    #
    #  To add a new IR sensor:
    #    1. Flash slave_rp2040_ir.yaml with the new slave_id
    #    2. Add a modbus_controller with the corresponding address
    #    3. Add a number that points to the new controller
    #    4. Add an MQTT on_message for your topic
    # ══════════════════════════════════════════════════════════════
    - topic: ${mqtt_name}/${s_name_upper} sensor/IR/command
      then:
        - lambda: |-
            std::map<std::string, int> special = {
              {"MUTE",             1001},
              {"GUIDE",            1002},
              {"BACK",             1003},
              {"CHANNEL FORWARD",  1004},
              {"CHANNEL BACK",     1005},
              {"ON",               1006},
              {"OFF",              1006},
            };
            int val = special.count(x) ? special[x] : atoi(x.c_str());
            if (val < 1 || val > 9999) return;
            id(${s_name}_ir).make_call().set_value(val).perform();

    - topic: ${mqtt_name}/${s_name_upper} sensor/Reset CO2 Baseline/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: ${s_name}_coil_co2_reset
            else:
              - switch.turn_off: ${s_name}_coil_co2_reset
    - topic: ${mqtt_name}/${s_name_upper} sensor/Temperature Setpoint/command
      then:
        - number.set:
            id: ${s_name}_setpoint_temp
            value: !lambda |-
              if (x.empty()) return 0;
              return (int)atoi(x.c_str()); 
    - topic: ${mqtt_name}/${s_name_upper} sensor/CO2 Setpoint/command
      then:
        - number.set:
            id: ${s_name}_setpoint_co2
            value: !lambda |-
              if (x.empty()) return 0;
              return (int)atoi(x.c_str()); 

# ──────────────────────────────────────────────────────────────
#  INPUT REGISTERS — FC04 (read only)
# ──────────────────────────────────────────────────────────────
sensor:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Temperature"
    id: ${s_name}_temp
    register_type: read
    address: 0
    value_type: U_WORD
    filters:
      - multiply: 0.1
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Temperature/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 1

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Humidity"
    id: ${s_name}_hum
    register_type: read
    address: 1
    value_type: U_WORD
    filters:
      - multiply: 0.1
    unit_of_measurement: "%"
    accuracy_decimals: 1
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Humidity/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 2    

