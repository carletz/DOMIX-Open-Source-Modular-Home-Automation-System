mqtt:
  on_message:
    - topic: ${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 1/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m4${m4_number_1}_channel_1
            else:
              - switch.turn_off: m4${m4_number_1}_channel_1
