# ──────────────────────────────────────────────────────────────
#  COILS — FC01/FC05 (reading and writing)
# ──────────────────────────────────────────────────────────────
switch:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Reset CO2 Baseline"
    id: ${s_name}_coil_co2_reset
    register_type: coil
    address: 1
    on_turn_on:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Reset CO2 Baseline/state"
          payload: "ON"
          retain: True
    on_turn_off:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Reset CO2 Baseline/state"
          payload: "OFF"
          retain: True     
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 17   

# ──────────────────────────────────────────────────────────────
#  HOLDING REGISTERS — FC03/FC06 (written by the ${s_name})
# ──────────────────────────────────────────────────────────────
number:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} IR Command"
    id: ${s_name}_ir
    register_type: holding
    address: 0
    value_type: U_WORD
    min_value: 0
    max_value: 9999
    step: 1
    mode: box
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 20

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Temperature Setpoint"
    id: ${s_name}_setpoint_temp
    register_type: holding
    address: 10
    value_type: U_WORD
    min_value: 0
    max_value: 40.0 
    step: 0.5
    multiply: 10
    unit_of_measurement: "°C"
    on_value:
      then:
        - mqtt.publish: 
            topic: "${mqtt_name}/${s_name_upper} sensor/Temperature Setpoint/state"
            payload: !lambda |-
                        char buf[10];
                        snprintf(buf, sizeof(buf), "%.1f", x);
                        return std::string(buf);
            retain: True            
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 18  

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} CO2 Setpoint"
    id: ${s_name}_setpoint_co2
    register_type: holding
    address: 11
    value_type: U_WORD
    min_value: 400
    max_value: 5000
    step: 50
    unit_of_measurement: "ppm"
    on_value:
      then:
        - mqtt.publish: 
            topic: "${mqtt_name}/${s_name_upper} sensor/CO2 Setpoint/state"
            payload: !lambda |-
                        char buf[10];
                        snprintf(buf, sizeof(buf), "%.0f", x);
                        return std::string(buf);
            retain: True            
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 19  

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Current time"
    id: ${s_name}_time
    register_type: holding
    address: 12
    value_type: U_WORD
    min_value: 0
    max_value: 2359
    step: 1
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 21  

select:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Display Command"
    id: ${s_name}_display_cmd
    address: 13
    value_type: U_WORD
    optionsmap:
      "OK":   0
      "VENT": 1
      "HEAT": 2
      "COOL": 3
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${s_name_upper} sensor/Display Command/state"
            payload: !lambda return x;
            retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 20  
      
# ──────────────────────────────────────────────────────────────
#  Automatically update current time every minute
# ──────────────────────────────────────────────────────────────
time:
  - platform: sntp
    on_time:
      - seconds: 0
        then:
          - lambda: |-
              auto t = id(myclock).now();
              if (t.is_valid()) {
                uint16_t hhmm = t.hour * 100 + t.minute;
                auto call = id(${s_name}_time).make_call();
                call.set_value(hhmm);
                call.perform();
              }
