    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} PIR Movement"
    id: ${s_name}_pir
    register_type: discrete_input
    address: 0
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/PIR Movement/state"
          payload: "ON"
          retain: True
    on_release:
