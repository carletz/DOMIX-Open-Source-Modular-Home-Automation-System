text_sensor: 
  - platform: template
    id: valve_status
    name: "${m9_description_upper} Status"
    icon: "mdi:check-circle"
    update_interval: never
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/Status/state"
            payload: !lambda 'return x;'
            retain: True          
    web_server:
      sorting_group_id: domix_m9_web
      sorting_weight: 4

  - platform: template
    id: progress_percent
    name: "${m9_description_upper} Progress %"
    update_interval: 1s
    icon: "mdi:percent"
    lambda: |-
      auto active = id(m9${m9_number_1}_sprinkler).active_valve();
      if (!active.has_value()) {
        return std::string("0%");
      }
      int valve = active.value();
      int total = id(m9${m9_number_1}_sprinkler).valve_run_duration_adjusted(valve);
      if (total <= 0) {
        return std::string("0%");
      }
      int remaining = id(m9${m9_number_1}_sprinkler).time_remaining_active_valve().value_or(0);
      int progress = round(((total - remaining) * 100.0) / total);
      if (progress < 0)   progress = 0;
      if (progress > 100) progress = 100;
      return std::to_string(progress) + "%";
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/Progress Percent/state"
            payload: !lambda 'return x;'
            retain: True          
    web_server:
      sorting_group_id: domix_m9_web
      sorting_weight: 6

  - platform: template
    id: total_time
    name: "${m9_description_upper} Total Time"
    icon: "mdi:timer"
    update_interval: 1s
    lambda: |-
      auto total_time = id(m9${m9_number_1}_sprinkler).total_cycle_time_all_valves();
      if (!total_time) {
        return std::string("0s");
      }
      int seconds = round(total_time);
      int days = seconds / 86400;
      seconds %= 86400;
      int hours = seconds / 3600;
      seconds %= 3600;
      int minutes = seconds / 60;
      seconds %= 60;
      std::string result;
      if (days)    result += std::to_string(days) + "d ";
      if (hours)  result += std::to_string(hours) + "h ";
      if (minutes)result += std::to_string(minutes) + "m ";
      result += std::to_string(seconds) + "s";
      return result;
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/Total Time/state"
            payload: !lambda 'return x;'
            retain: True
    web_server:
      sorting_group_id: domix_m9_web
      sorting_weight: 7

  - platform: template
    id: time_remaining
    name: "${m9_description_upper} Time Remaining"
    icon: "mdi:timer-outline"
    update_interval: 1s
    lambda: |-
      auto remaining_opt =
        id(m9${m9_number_1}_sprinkler).time_remaining_active_valve();
      if (!remaining_opt.has_value() || remaining_opt.value() <= 0) {
        return std::string("0s");
      }
      int seconds = round(remaining_opt.value());
      int days = seconds / 86400;
      seconds %= 86400;
      int hours = seconds / 3600;
      seconds %= 3600;
      int minutes = seconds / 60;
      seconds %= 60;
      std::string result;
      if (days)    result += std::to_string(days) + "d ";
      if (hours)  result += std::to_string(hours) + "h ";
      if (minutes)result += std::to_string(minutes) + "m ";
      result += std::to_string(seconds) + "s";
      return result;
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/Time Remaining/state"
            payload: !lambda 'return x;' 
            retain: True         
    web_server:
      sorting_group_id: domix_m9_web
      sorting_weight: 8

sprinkler:
  - id: m9${m9_number_1}_sprinkler
    main_switch: 
      name: "Program Start - Stop - Resume"
      id: main_irrigation
      web_server:
        sorting_group_id: domix_m9_web
        sorting_weight: 1
    auto_advance_switch: 
      name: "${m9_description_upper} ${m9_valve_description} Auto Advance"
      web_server:
        sorting_group_id: domix_m9_web
        sorting_weight: 60
    reverse_switch: 
      name: "${m9_description_upper} ${m9_valve_description} Reverse"
      web_server:
        sorting_group_id: domix_m9_web
        sorting_weight: 61
    valve_open_delay: 2s
    repeat_number: 
      name: "Repeat"
      web_server:
        sorting_group_id: domix_m9_web
        sorting_weight: 46
    valves:
      - valve_switch: 
          name: "${m9_valve_description} 1"
          web_server:
            sorting_group_id: domix_m9_web
            sorting_weight: 21
        enable_switch: 
          name: "Enable ${m9_valve_description} 1"
          web_server:
            sorting_group_id: domix_m9_web
            sorting_weight: 22
        run_duration: 60s
        valve_switch_id: m9${m9_number_1}_valve_1  
      - valve_switch: 
          name: "${m9_valve_description} 2"
          web_server:
