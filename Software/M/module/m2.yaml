              - switch.turn_on: m2${m2_number_1}_O_channel_8
            else:
              - switch.turn_off: m2${m2_number_1}_O_channel_8

# Configuration for PCA chip
pca9554:
  - id: domix_m2${m2_number_1}_busi2c
    address: ${m2_i2c_1}
    i2c_id: ${m2_i2c_id}              # Bus for comunication with DOMIX M1 module
    pin_count: 16
    
# INPUT: from GPIO0_0 up to GPIO0_7 (Port 0) of PCA chip
binary_sensor:
  - platform: gpio
    name: "${m2_name}${m2_number_1} ${m2_input_name} channel 1"
    id: m2${m2_number_1}_I_channel_1
    icon: "mdi:input"
    pin:
      pca9554: domix_m2${m2_number_1}_busi2c
      number: 0
      mode: INPUT
      inverted: false
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${m2_name}${m2_number_1}/${m2_input_name} 1/state"
          payload: "ON"
          retain: True
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${m2_name}${m2_number_1}/${m2_input_name} 1/state"
          payload: "OFF"
          retain: True       
    web_server:
      sorting_group_id: domix_m2_web
      sorting_weight: 1

  - platform: gpio
    name: "${m2_name}${m2_number_1} ${m2_input_name} channel 2"
