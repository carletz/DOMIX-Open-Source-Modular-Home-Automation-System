# ============================================================================
#   DOMIX Configuration
# ============================================================================
# This is the base configuration file for DOMIX modular system.
# The user can adapt and modify at his use the following code and the 
# connected packages.
# ============================================================================

# ----------------------------------------------------------------------------
# PACKAGES
# Users can modify, remove or add packages considering the configuration
# ----------------------------------------------------------------------------
packages:
  # --- package normali con trattino ---
  esp:          !include hardware/esp.yaml
  data:         !include hardware/data.yaml             # === Base System Configuration ===
  ethernet:     !include hardware/ethernet.yaml
  web_server:   !include hardware/web_server.yaml
  mqtt:         !include hardware/mqtt.yaml
  ota:          !include hardware/ota.yaml
  
  # WARNING: if you use the middle module V1.0 use this package
  # and leave the i2c_switch.yaml package commented, otherwise use the 
  # i2c_switch.yaml package and comment this one
  i2c:          !include hardware/i2c.yaml
  # WARNING: if you use the middle module V1.2 use this package
  # and leave the i2c.yaml package commented, otherwise use the 
  # i2c.yaml package and comment this one
  # i2c:          !include hardware/i2c_switch.yaml

  zigbee:       !include hardware/zigbee.yaml           # === System Add-on ===
  restart:      !include hardware/restart.yaml
  info:         !include hardware/info.yaml
  log:          !include hardware/log.yaml
  uart:         !include hardware/uart.yaml
  m1:           !include module/m1.yaml                 # === M1 Screen and Button ===
  wire:         !include sensor/wire.yaml               # === M1 1-wire sensor ===
  m2:           !include module/m2.yaml                 # === M2 module configuration ===
  m3:           !include module/m3.yaml                 # === M3 module configuration ===
  m4:           !include module/m4_shutters.yaml        # === M4 module configuration ===
  m5:           !include module/m5_shutters.yaml        # === M5 module configuration ===
  m6:           !include module/m6.yaml                 # === M6 module configuration ===
  m7:           !include module/m7.yaml                 # === M7 module configuration ===
  m8:           !include module/m8.yaml                 # === M8 module configuration ===
  m9:           !include module/m9.yaml                 # === M9 module configuration ===

  # ================================================================
  # Add sensor module is made calling the same modbus_master file
  # substituting every time a differen set of variables
  # Please be sure of the relevant address, myst be UNIQUE.
  # ================================================================

  slave_living:
    <<: !include
      file: sensor/modbus_master.yaml
      vars:
        s_name: living
        s_name_upper: Living
        s_modbus_addr: "0x01"
        s_controller_id: modbus_slave1
        sorting_weight: -200

