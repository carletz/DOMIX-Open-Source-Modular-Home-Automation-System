button:
  - platform: restart                   # Overall system restart button
    name: "${device_name} Restart"
    id: esp_reboot_button
    icon: "mdi:restart-alt"
    on_press:
      - mqtt.publish:
          topic: ${device_name}/Restart/state
          payload: "PRESSED"
    web_server:
      sorting_group_id: various
      sorting_weight: 1

