mqtt:
  on_message:
    - topic: ${mqtt_name}/${m2_name}${m2_number_1}/${m2_output_name} 1/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m2${m2_number_1}_O_channel_1
            else:
              - switch.turn_off: m2${m2_number_1}_O_channel_1
