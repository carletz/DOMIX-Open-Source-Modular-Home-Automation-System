esphome:
  on_boot:
    priority: -100
    then:
      - text_sensor.template.publish:
          id: valve_status
          state: "Idle"
      - sprinkler.set_multiplier:
          id: m9${m9_number_1}_sprinkler
          multiplier: 60

mqtt:
  on_message:
    - topic: ${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/${m9_valve_description} 1/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m9${m9_number_1}_valve_1
            else:
              - switch.turn_off: m9${m9_number_1}_valve_1
