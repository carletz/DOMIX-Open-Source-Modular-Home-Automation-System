number:
  - platform: template
    id: valve_1
    name: "${m9_description_upper} ${m9_valve_description} Duration 1"
    icon: "mdi:time-auto"
    min_value: 1
    max_value: 15
    step: 1
    unit_of_measurement: Min
    mode: box # Defines how the number should be displayed in the UI
    lambda: "return id(m9${m9_number_1}_sprinkler).valve_run_duration(0);"
    set_action:
      - sprinkler.set_valve_run_duration:
          id: m9${m9_number_1}_sprinkler
          valve_number: 0
          run_duration: !lambda 'return x;'
      - mqtt.publish:
          topic: "${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/${m9_valve_description} 1/Duration/state"
          payload: !lambda |-
