ethernet:
  type: W5500
  clk_pin: GPIO43
  mosi_pin: GPIO44
  miso_pin: GPIO42
  cs_pin: GPIO41
  interrupt_pin: GPIO2
  reset_pin: GPIO1
  manual_ip:
    static_ip: ${ethernet_IP}
    gateway: ${ethernet_gateway}
    subnet: ${ethernet_subnet}
    dns1: 8.8.8.8       # DNS di Google needed for clock upgrade
    dns2: 8.8.4.4       # DNS di Google needed for clock upgrade