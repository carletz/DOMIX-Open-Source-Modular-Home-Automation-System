          topic: "${mqtt_name}/${s_name_upper} sensor/Active Alarm/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 16

# ──────────────────────────────────────────────────────────────
#  COILS — FC01/FC05 (reading and writing)
# ──────────────────────────────────────────────────────────────
switch:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Reset CO2 Baseline"
    id: ${s_name}_coil_co2_reset
    register_type: coil
    address: 1
    on_turn_on:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Reset CO2 Baseline/state"
          payload: "ON"
          retain: true
    on_turn_off:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Reset CO2 Baseline/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 30

# ──────────────────────────────────────────────────────────────
#  HOLDING REGISTERS — FC03/FC06
# ──────────────────────────────────────────────────────────────
number:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} IR Command"
    id: ${s_name}_ir
    register_type: holding
    address: 0
    value_type: U_WORD
    min_value: 0
    max_value: 9999
    step: 1
    mode: box
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 31

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Temperature Setpoint"
    id: ${s_name}_setpoint_temp
    register_type: holding
    address: 10
    value_type: U_WORD
    min_value: 0
    max_value: 40.0
    step: 0.5
    multiply: 10
    unit_of_measurement: "°C"
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${s_name_upper} sensor/Temperature Setpoint/state"
            payload: !lambda |-
                        char buf[10];
                        snprintf(buf, sizeof(buf), "%.1f", x);
                        return std::string(buf);
            retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 32

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} CO2 Setpoint"
    id: ${s_name}_setpoint_co2
    register_type: holding
    address: 11
    value_type: U_WORD
    min_value: 400
    max_value: 5000
    step: 50
    unit_of_measurement: "ppm"
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${s_name_upper} sensor/CO2 Setpoint/state"
            payload: !lambda |-
                        char buf[10];
                        snprintf(buf, sizeof(buf), "%.0f", x);
                        return std::string(buf);
            retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 33

  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Current time"
    id: ${s_name}_time
    register_type: holding
    address: 12
    value_type: U_WORD
    min_value: 0
    max_value: 2359
    step: 1
    internal: true   

text_sensor:
  - platform: template
    name: "${s_name_upper} Current time"
    id: ${s_name}_time_display
    lambda: |-
      int v = (int) id(${s_name}_time).state;
      if (v < 0 || v > 2359) return {"--:--"};
      char buf[6];
      snprintf(buf, sizeof(buf), "%02d:%02d", v / 100, v % 100);
      return {buf};
    update_interval: 30s
    icon: "mdi:clock-outline"
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Current time/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 34

  - platform: template
    name: "${s_name_upper} General Status"
    id: ${s_name}_general_status
    icon: "mdi:lan-connect"
    update_interval: 10s
    lambda: |-
      static uint16_t last_hb  = 0xFFFF;
      static uint32_t last_chg = 0;
      uint16_t hb = (uint16_t) id(${s_name}_heartbeat).state;
      if (hb != last_hb) {
        last_hb  = hb;
        last_chg = millis();
      }
      return std::string((millis() - last_chg) < 30000 ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/General Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 40

  # ── BME280 Status ─────────────────────────────────────────
  - platform: template
    name: "${s_name_upper} BME280 Status"
    id: ${s_name}_status_bme280
    icon: "mdi:thermometer"
    update_interval: 10s
    lambda: |-
      bool ok = (uint16_t)id(${s_name}_valid_mask).state & (1 << 0);
      return std::string(ok ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/BME280 Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 41

  # ── BH1750 Status ─────────────────────────────────────────
  - platform: template
    name: "${s_name_upper} BH1750 Status"
    id: ${s_name}_status_bh1750
    icon: "mdi:brightness-6"
    update_interval: 10s
    lambda: |-
      bool ok = (uint16_t)id(${s_name}_valid_mask).state & (1 << 1);
      return std::string(ok ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/BH1750 Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 42

  # ── SCD41 Status ──────────────────────────────────────────
  - platform: template
    name: "${s_name_upper} SCD41 Status"
    id: ${s_name}_status_scd41
    icon: "mdi:molecule-co2"
    update_interval: 10s
    lambda: |-
      bool ok = (uint16_t)id(${s_name}_valid_mask).state & (1 << 2);
      return std::string(ok ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/SCD41 Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 43

  # ── SGP41 Status ──────────────────────────────────────────
  - platform: template
    name: "${s_name_upper} SGP41 Status"
    id: ${s_name}_status_sgp41
    icon: "mdi:air-filter"
    update_interval: 10s
    lambda: |-
      bool ok = (uint16_t)id(${s_name}_valid_mask).state & (1 << 3);
      return std::string(ok ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/SGP41 Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 44

  # ── LD2410 Status ─────────────────────────────────────────
  - platform: template
    name: "${s_name_upper} LD2410 Status"
    id: ${s_name}_status_ld2410
    icon: "mdi:radar"
    update_interval: 10s
    lambda: |-
      bool ok = (uint16_t)id(${s_name}_valid_mask).state & (1 << 4);
      return std::string(ok ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/LD2410 Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 45

  # ── PIR Status ────────────────────────────────────────────
  - platform: template
    name: "${s_name_upper} PIR Status"
    id: ${s_name}_status_pir
    icon: "mdi:motion-sensor"
    update_interval: 10s
    lambda: |-
      bool ok = (uint16_t)id(${s_name}_valid_mask).state & (1 << 5);
      return std::string(ok ? "Online" : "Offline");
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/PIR Status/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 46

select:
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Display Command"
    id: ${s_name}_display_cmd
    address: 13
    value_type: U_WORD
    optionsmap:
      "OK":   0
      "VENT": 1
      "HEAT": 2
      "COOL": 3
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${s_name_upper} sensor/Display Command/state"
            payload: !lambda return x;
            retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 35

time:
  - platform: sntp
    on_time:
      - seconds: 0
        then:
          - lambda: |-
              auto t = id(myclock).now();
              if (t.is_valid()) {
                uint16_t hhmm = t.hour * 100 + t.minute;
                auto call = id(${s_name}_time).make_call();
                call.set_value(hhmm);
                call.perform();
              }
