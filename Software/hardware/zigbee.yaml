#External component Stream Server
external_components:
  - source: github://mercenaruss/esphome-stream-server

switch:
  - platform: restart
    name: "Gateway Restart"       # Zigbee gateway restart
    icon: "mdi:captive-portal"
    web_server:
      sorting_group_id: zigbee
      sorting_weight: 1

  - platform: gpio                # Zigbee Gateway button restart
    pin: 47
    id: zRST_gpio
    inverted: yes
    restore_mode: ALWAYS_OFF
    
  - platform: template            # Zigbee Template button restart
    name: "Zigbee RST"
    id: zRST
    icon: "mdi:reset-settings"
    turn_on_action:
      - switch.turn_on: zRST_gpio
      - delay: 15ms
      - switch.turn_off: zRST_gpio
    web_server:
      sorting_group_id: zigbee
      sorting_weight: 2

  - platform: gpio                # Zigbee BSL button
    pin: 21
    name: "Zigbee BSL"
    icon: "mdi:chached"
    id: zBSL
    inverted: yes
    restore_mode: ALWAYS_OFF
    internal: true
    
  - platform: template            # Button for Zigbee firmware update
    name: "Firmware Update"
    icon: "mdi:business-chip"
    turn_on_action:
      - script.execute: fw_update_mode
    turn_off_action:
      - switch.toggle: zRST
    web_server:
      sorting_group_id: zigbee
      sorting_weight: 3

script:
  - id: fw_update_mode            # Update CC2652 Firmware
    then:
      - switch.turn_on: zBSL
      - delay: 1s
      - switch.turn_on: zRST_gpio
      - delay: 1s
      - switch.turn_off: zRST_gpio
      - logger.log: "Delaying ~5 seconds for TI chip to be ready"
      - delay: 5s
      - switch.turn_off: zBSL
      - logger.log: "Update with cc2538-bsl tool now!"
      - logger.log: "Usage: cc2538_bsl.py -p socket://192.168.1.8:6638 -evw CC1352P2_CC2652P_launchpad_coordinator_20250321.hex"


uart:
  - id: uart_bus                    # UART Settings for Zigbee Coordinator
    rx_pin: GPIO06
    tx_pin: GPIO07
    baud_rate: 115200

#Serial Bridge Settings,uncomment #port to change default 6638 TCP port
stream_server:
  uart_id: uart_bus
#  port: 1234    