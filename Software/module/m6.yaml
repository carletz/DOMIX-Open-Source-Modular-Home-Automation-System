    icon: "mdi:electric_meter"
    update_interval: 5s
    filters:
      - calibrate_linear:
          # Measured value of 0 maps to 0A
          - 0.0034 -> 0
          # Known load: 4.0A
          # Value shown in logs: 0.1333A
          - 0.31749 -> 8.95608
    qos: 1
    retain: true
    availability:
      topic: ${mqtt_name}/${m6_name}${m6_number_1}/${m6_channel_description} 1
      payload_available: online
      payload_not_available: offline
    state_topic: ${mqtt_name}/${m6_name}${m6_number_1}/${m6_channel_description} 1/Current/state
