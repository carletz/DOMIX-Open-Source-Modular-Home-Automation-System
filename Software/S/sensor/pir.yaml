esphome:
  build_path: .esphome/build
  platformio_options:
    build_flags:
      - "-DHAS_PIR"

binary_sensor:
  - platform: gpio
    name: "PIR Movement"
    id: pir_sensor
    pin:
      number: GPIO6
      mode: INPUT_PULLDOWN
    device_class: motion
    filters:
      - delayed_off: 5s           # keep ON for 5s after last trigger
