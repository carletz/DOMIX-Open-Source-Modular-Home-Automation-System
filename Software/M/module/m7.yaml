# Configuration for pca9554 chip
pca9554:
  - id: domix_m7${m7_number_1}_busi2c
    address: ${m7_i2c_1}
    i2c_id: ${m7_i2c_id}              # Bus for comunication with DOMIX M1 module
    pin_count: 16
    
switch:
  - platform: gpio
    name: "${m7_name}${m7_number_1} ${m7_output_name} channel 1"
    id: m7${m7_number_1}_O_channel_1
    icon: "mdi:switch"
    pin:
      pca9554: domix_m7${m7_number_1}_busi2c
      number: 15
      mode: OUTPUT
      inverted: true
    on_turn_on:
      - mqtt.publish:
          topic: "${mqtt_name}/${m7_name}${m7_number_1}/${m7_output_name} 1/state"
          payload: "ON"
          retain: True
    on_turn_off:
      - mqtt.publish:
          topic: "${mqtt_name}/${m7_name}${m7_number_1}/${m7_output_name} 1/state"
          payload: "OFF"
          retain: True       
    web_server:
      sorting_group_id: domix_m7_web
      sorting_weight: 1

