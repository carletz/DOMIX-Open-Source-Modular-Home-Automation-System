            else:
              - switch.turn_off: m4${m4_number_1}_channel_5
    - topic: ${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 6/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m4${m4_number_1}_channel_6
            else:
              - switch.turn_off: m4${m4_number_1}_channel_6

pca9554:
  - id: domix_m4${m4_number_1}_busi2c
    address: ${m4_i2c_1}
    i2c_id: ${m4_i2c_id}              # Bus for comunication with DOMIX M1 module

switch:
  - platform: gpio
    name: "${m4_name}${m4_number_1} ${m4_output_name} channel 1"
    id: m4${m4_number_1}_channel_1
    icon: "mdi:blinds"
    pin:
      pca9554: domix_m4${m4_number_1}_busi2c
      number: 0
      mode: OUTPUT
      inverted: false
    on_turn_on:
      - mqtt.publish:
          topic: "${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 1/state"
          payload: "ON"
          retain: True
    on_turn_off:
      - mqtt.publish:
          topic: "${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 1/state"
          payload: "OFF"
          retain: True       
    web_server:
      sorting_group_id: domix_m4_web
      sorting_weight: 1

