  - id: domix_m5${m5_number_1}_busi2c
    address: ${m5_i2c_1}
    i2c_id: ${m5_i2c_id}              # Bus for comunication with DOMIX M1 module
    pin_count: 16

cover:
  - platform: time_based
    name: "Main Bedroom Shutter"
    id: main_bedroom_shutter
    
    open_action:
      - switch.turn_on: m5${m5_number_1}_channel_1
    open_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    close_action:
      - switch.turn_on: m5${m5_number_1}_channel_2
    close_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    stop_action:
      - switch.turn_off: m5${m5_number_1}_channel_1
