switch:
  - platform: gpio
    name: "${m5_name}${m5_number_1} ${m5_output_name} channel 1"
    id: m5${m5_number_1}_channel_1
    icon: "mdi:blinds"
    interlock:  &interlock_group_1 
      - m5${m5_number_1}_channel_1
      - m5${m5_number_1}_channel_2
    interlock_wait_time: 500ms
    restore_mode: ALWAYS_OFF
    pin:
      pca9554: domix_m5${m5_number_1}_busi2c
      number: 0
      mode: OUTPUT
      inverted: false
    on_turn_on:
      - mqtt.publish:
          topic: "${mqtt_name}/${m5_name}${m5_number_1}/${m5_output_name} 1/state"
          payload: "ON"
          retain: True
    on_turn_off:
      - mqtt.publish:
          topic: "${mqtt_name}/${m5_name}${m5_number_1}/${m5_output_name} 1/state"
          payload: "OFF"
          retain: True       
    web_server:
      sorting_group_id: domix_m5_web
      sorting_weight: 1

  - platform: gpio
