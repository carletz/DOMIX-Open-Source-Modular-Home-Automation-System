# Binary sensors for open and closed state
binary_sensor:
  - platform: template
    name: "${m3_name}${m3_number_1} ${m3_channel_name} 1"
    id: domix_m3${m3_number_1}_ch0_state
    icon: "mdi:door-sensor"
    device_class: opening
    lambda: |-
      float v = id(clamp_ch0_m3${m3_number_1}).state;
      if (v > 2.5) return false;  // Closed
      if (v < 0.8) return true;   // Open
      return {};
    # Filter to avoid false trigger
    filters:
      - delayed_on: 50ms       # Should stay ON for 50ms
      - delayed_off: 50ms      # Should stay OFF for 50ms      
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${m3_name}${m3_number_1}/${m3_channel_name} 1/state"
          payload: "ON"
          retain: True
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${m3_name}${m3_number_1}/${m3_channel_name} 1/state"
          payload: "OFF"
          retain: True       
    web_server:
      sorting_group_id: domix_m3_web
      sorting_weight: 1

  - platform: template
