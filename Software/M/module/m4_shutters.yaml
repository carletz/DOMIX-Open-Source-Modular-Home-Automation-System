            else:
              - switch.turn_off: m4${m4_number_1}_channel_3
    - topic: ${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 4/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m4${m4_number_1}_channel_4
            else:
              - switch.turn_off: m4${m4_number_1}_channel_4
    - topic: ${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 5/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m4${m4_number_1}_channel_5
            else:
              - switch.turn_off: m4${m4_number_1}_channel_5
    - topic: ${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 6/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m4${m4_number_1}_channel_6
            else:
              - switch.turn_off: m4${m4_number_1}_channel_6

pca9554:
  - id: domix_m4${m4_number_1}_busi2c
    address: ${m4_i2c_1}
    i2c_id: ${m4_i2c_id}              # Bus for comunication with DOMIX M1 module

cover:
  - platform: time_based
    name: "Living Room Shutter"
    id: living_room_shutter
    
    open_action:
      - switch.turn_on: m4${m4_number_1}_channel_1
    open_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    close_action:
      - switch.turn_on: m4${m4_number_1}_channel_2
    close_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    stop_action:
      - switch.turn_off: m4${m4_number_1}_channel_1
      - switch.turn_off: m4${m4_number_1}_channel_2
    web_server:
      sorting_group_id: domix_m4_web
      sorting_weight: 3

  - platform: time_based
    name: "Dining Room Shutter"
    id: dining_room_shutter
    
    open_action:
      - switch.turn_on: m4${m4_number_1}_channel_3  
    open_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    close_action:
      - switch.turn_on: m4${m4_number_1}_channel_4
    close_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    stop_action:
      - switch.turn_off: m4${m4_number_1}_channel_3
      - switch.turn_off: m4${m4_number_1}_channel_4
    web_server:
      sorting_group_id: domix_m4_web
      sorting_weight: 6

  - platform: time_based
    name: "Kitchen Room Shutter"
    id: kitchen_room_shutter

    open_action:
      - switch.turn_on: m4${m4_number_1}_channel_5
    open_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    close_action:
      - switch.turn_on: m4${m4_number_1}_channel_6
    close_duration: 30s                # to be measured for each shutter, time necessary to open completely
    
    stop_action:
      - switch.turn_off: m4${m4_number_1}_channel_5
      - switch.turn_off: m4${m4_number_1}_channel_6      
    web_server:
      sorting_group_id: domix_m4_web
      sorting_weight: 9

switch:
  - platform: gpio
    name: "${m4_name}${m4_number_1} ${m4_output_name} channel 1"
    id: m4${m4_number_1}_channel_1
    icon: "mdi:blinds"
    interlock:  &interlock_group_1 
      - m4${m4_number_1}_channel_1
      - m4${m4_number_1}_channel_2
    interlock_wait_time: 500ms
    restore_mode: ALWAYS_OFF
    pin:
      pca9554: domix_m4${m4_number_1}_busi2c
      number: 0
      mode: OUTPUT
      inverted: false
    on_turn_on:
      - mqtt.publish:
          topic: "${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 1/state"
          payload: "ON"
          retain: True
    on_turn_off:
      - mqtt.publish:
          topic: "${mqtt_name}/${m4_name}${m4_number_1}/${m4_output_name} 1/state"
          payload: "OFF"
          retain: True       
    web_server:
      sorting_group_id: domix_m4_web
      sorting_weight: 1

  - platform: gpio
