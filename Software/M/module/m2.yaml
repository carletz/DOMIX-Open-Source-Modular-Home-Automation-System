            then:
              - switch.turn_on: m2${m2_number_1}_O_channel_4
            else:
              - switch.turn_off: m2${m2_number_1}_O_channel_4
    - topic: ${mqtt_name}/${m2_name}${m2_number_1}/${m2_output_name} 5/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m2${m2_number_1}_O_channel_5
            else:
              - switch.turn_off: m2${m2_number_1}_O_channel_5
    - topic: ${mqtt_name}/${m2_name}${m2_number_1}/${m2_output_name} 6/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: m2${m2_number_1}_O_channel_6
            else:
              - switch.turn_off: m2${m2_number_1}_O_channel_6
    - topic: ${mqtt_name}/${m2_name}${m2_number_1}/${m2_output_name} 7/command
      then:
