#
# M3 MODULE BASIC DESIGN FOR BASIC FUNCTIONS
#
# Adapt the configurations, names and other to your needs
#
# ============================================================================

# PCA9554A I/O Expander (for multiplexing of CD74HC4067 chip channel S0-S3)
pca9554:
  - id: domix_m3${m3_number_1}_busi2c
    address: ${m3_i2c_1} 
    i2c_id: ${m3_i2c_id}    

# ADS1115 ADC
ads1115:
  - id: domix_m3${m3_number_1}_ads1115_hub
    address: ${m3_ads_1} 
    continuous_mode: off
    i2c_id: ${m3_i2c_id}              # Bus for comunication with DOMIX M1 module

# Configurazione multiplexer CD74HC4067
cd74hc4067:
  - id: m3${m3_number_1}_mux
    delay: 15ms
    pin_s0:
      pca9554: domix_m3${m3_number_1}_busi2c
      number: 3
      mode: OUTPUT
      inverted: false
    pin_s1:
      pca9554: domix_m3${m3_number_1}_busi2c
      number: 2
      mode: OUTPUT
      inverted: false
    pin_s2:
      pca9554: domix_m3${m3_number_1}_busi2c
      number: 1
      mode: OUTPUT
      inverted: false
    pin_s3:
      pca9554: domix_m3${m3_number_1}_busi2c
      number: 0
      mode: OUTPUT
      inverted: false

# Custom component per multiplexer
sensor:
  # Channel 0
  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 1.024
    id: domix_m3${m3_number_1}_clamp_ch0
    ads1115_id: domix_m3${m3_number_1}_ads1115_hub
