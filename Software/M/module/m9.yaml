datetime:
  - platform: template
    name: "Irrigation Start Time"
    icon: "mdi:alarm"    
    entity_category: config
    id: ${m9_description}_s1t
    type: time
    restore_value: true
    initial_value: "22:00"
    optimistic: True
    on_value:
      then:
        - mqtt.publish:
            topic: "${mqtt_name}/${m9_name}${m9_number_1}/${m9_description_upper}/Start Time/state"
            payload: !lambda |-
                char buf[5];
                sprintf(buf,"%02d:%02d", id(${m9_description}_s1t).hour, id(${m9_description}_s1t).minute);
                return std::string(buf);   
            retain: True          
    web_server:
      sorting_group_id: domix_m9_web
      sorting_weight: 3

time:
  - platform: sntp
    id: myclock
    on_time:
      # Every 1 minute
      - seconds: 0
        minutes: /1
        then:
        - script.execute: ${m9_description}_script1

script:
    # check what day of the week it is currently, and if we have the schedule enabled today
    - id: ${m9_description}_script1 
      then:
        lambda: |-
          int dow = id(myclock).now().day_of_week;
          if      ((dow == 1 && id(${m9_description}_sunday).state == true)
          ||       (dow == 2 && id(${m9_description}_monday).state == true)
          ||       (dow == 3 && id(${m9_description}_tuesday).state == true)
          ||       (dow == 4 && id(${m9_description}_wednesday).state == true)
          ||       (dow == 5 && id(${m9_description}_thursday).state == true)
          ||       (dow == 6 && id(${m9_description}_friday).state == true)
          ||       (dow == 7 && id(${m9_description}_saturday).state == true)) {
            id(${m9_description}_script2).execute();
          }
    # if current time is equal to any of the scheduled start times, start the sprinkler cycle
    - id: ${m9_description}_script2
      then:
        lambda: |-
          int hour = id(myclock).now().hour;
          int minute = id(myclock).now().minute;
          if      ((hour == id(${m9_description}_s1t).hour && minute == id(${m9_description}_s1t).minute && id(${m9_description}_schedule1_enabled).state == true && id(${m9_description}_raindelay_24h_enabled).state == false && id(${m9_description}_raindelay_48h_enabled).state == false)) {
            id(${m9_description}_script3).execute();
          }
    # start the sprinkler cycle
    - id: ${m9_description}_script3
      then:
        - sprinkler.start_full_cycle: m9${m9_number_1}_sprinkler
        - lambda: ESP_LOGI("main", "Irrigation cycle of ${m9_description_upper} has begun!");

