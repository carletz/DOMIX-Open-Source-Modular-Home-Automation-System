# ──────────────────────────────────────────────────────────────
#  Read data from DOMIX S sensor module
#  Add more module at your use adding blocks and changing address
# ──────────────────────────────────────────────────────────────
#
#  SUBSTITUTIONS REQUIRED in your main config:
#
#  s_controller_id:  unique id for this modbus controller
#  s_modbus_addr:    modbus slave address (e.g. 0x01)
#  s_name:           snake_case name (e.g. salon)
#  s_name_upper:     display name     (e.g. Salon)
#  sorting_weight:   web_server sort group weight
#  mqtt_name:        MQTT base topic
# ──────────────────────────────────────────────────────────────

modbus_controller:
  - id: ${s_controller_id}
    modbus_id: modbus_bus
    address: ${s_modbus_addr}
    # 7s — intentionally offset from slave 5s cycle to avoid
    # reading while slave is writing registers (race condition).
    update_interval: 7s

web_server:
  sorting_groups:
    - id: ${s_name}
      name: "${s_name_upper} sensor"
      sorting_weight: ${sorting_weight}

mqtt:
  on_message:
    # ══════════════════════════════════════════════════════════════
    #  IR commands over MQTT → Modbus holding register 0
    # ══════════════════════════════════════════════════════════════
    - topic: ${mqtt_name}/${s_name_upper} sensor/IR/command
      then:
        - lambda: |-
            std::map<std::string, int> special = {
              {"MUTE",             1001},
              {"GUIDE",            1002},
              {"BACK",             1003},
              {"CHANNEL FORWARD",  1004},
              {"CHANNEL BACK",     1005},
              {"ON",               1006},
              {"OFF",              1006},
            };
            int val = special.count(x) ? special[x] : atoi(x.c_str());
            if (val < 1 || val > 9999) return;
            id(${s_name}_ir).make_call().set_value(val).perform();

    - topic: ${mqtt_name}/${s_name_upper} sensor/Reset CO2 Baseline/command
      then:
        - if:
            condition:
              lambda: 'return x == "ON";'
            then:
              - switch.turn_on: ${s_name}_coil_co2_reset
            else:
              - switch.turn_off: ${s_name}_coil_co2_reset

    - topic: ${mqtt_name}/${s_name_upper} sensor/Temperature Setpoint/command
      then:
        - number.set:
            id: ${s_name}_setpoint_temp
            value: !lambda |-
              if (x.empty()) return 0;
              return (int)atoi(x.c_str());

    - topic: ${mqtt_name}/${s_name_upper} sensor/CO2 Setpoint/command
      then:
        - number.set:
            id: ${s_name}_setpoint_co2
            value: !lambda |-
              if (x.empty()) return 0;
              return (int)atoi(x.c_str());

# ──────────────────────────────────────────────────────────────
#  INPUT REGISTERS — FC04 (read only)
#  All sensors include a zero filter (register=0 → bad read) and a
#  range filter: values outside the plausible range are discarded
#  (return {}) — the entity keeps its last valid state.
#  After 3 consecutive bad readings the filter publishes NaN
#  so Home Assistant marks the entity as "unavailable".
#  Note: lux and distance legitimately can be 0 — no zero filter there.
# ──────────────────────────────────────────────────────────────
sensor:

  # ── reg[0] — Temperature (BME280) ─────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Temperature"
    id: ${s_name}_temp
    register_type: read
    address: 0
    value_type: U_WORD
    filters:
      - multiply: 0.1
      - lambda: |-
          static int bad = 0;
          if (x == 0.0) return {};
          if (x < -10.0 || x > 80.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Temperature/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 1

  # ── reg[1] — Humidity (BME280) ────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Humidity"
    id: ${s_name}_hum
    register_type: read
    address: 1
    value_type: U_WORD
    filters:
      - multiply: 0.1
      - lambda: |-
          static int bad = 0;
          if (x == 0.0) return {};
          if (x < 0.0 || x > 100.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    unit_of_measurement: "%"
    accuracy_decimals: 1
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Humidity/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 2

  # ── reg[2] — Pressure (BME280) ────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Pressure"
    id: ${s_name}_pres
    register_type: read
    address: 2
    value_type: U_WORD
    filters:
      - multiply: 0.1
      - lambda: |-
          static int bad = 0;
          if (x == 0.0) return {};
          if (x < 800.0 || x > 1100.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    unit_of_measurement: "hPa"
    accuracy_decimals: 1
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Pressure/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 3

  # ── reg[3] — Brightness (BH1750) ──────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Brightness"
    id: ${s_name}_lux
    register_type: read
    address: 3
    value_type: U_WORD
    filters:
      - lambda: |-
          static int bad = 0;
          if (x < 0.0 || x > 65000.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    unit_of_measurement: "lux"
    accuracy_decimals: 0
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Brightness/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 4

  # ── reg[4] — VOC Index (SGP41) ────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} VOC Index"
    id: ${s_name}_voc
    register_type: read
    address: 4
    value_type: U_WORD
    filters:
      - lambda: |-
          static int bad = 0;
          if (x < 0.0 || x > 500.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    accuracy_decimals: 0
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/VOC Index/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 5

  # ── reg[5] — NOx Index (SGP41) ────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} NOx Index"
    id: ${s_name}_nox
    register_type: read
    address: 5
    value_type: U_WORD
    filters:
      - lambda: |-
          static int bad = 0;
          if (x < 0.0 || x > 500.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    accuracy_decimals: 0
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/NOx Index/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 6

  # ── reg[6] — CO2 (SCD41) ──────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} CO2"
    id: ${s_name}_co2
    register_type: read
    address: 6
    value_type: U_WORD
    filters:
      - lambda: |-
          static int bad = 0;
          if (x == 0.0) return {};
          if (x < 300.0 || x > 10000.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/CO2/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 7

  # ── reg[7] — Detected Distance (LD2410) ───────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Detected Distance"
    id: ${s_name}_dist
    register_type: read
    address: 7
    value_type: U_WORD
    filters:
      - lambda: |-
          static int bad = 0;
          if (x < 0.0 || x > 600.0) { if (++bad > 3) return NAN; return {}; }
          bad = 0; return x;
    unit_of_measurement: "cm"
    accuracy_decimals: 0
    qos: 1
    retain: true
    state_topic: ${mqtt_name}/${s_name_upper} sensor/Detected Distance/state
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 8

  # ── reg[8] — Heartbeat ────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Heartbeat"
    id: ${s_name}_heartbeat
    register_type: read
    address: 8
    value_type: U_WORD
    internal: true     

  # ── reg[9] — Validity bitmask ─────────────────────────────
  # bit 0 = BME280 | bit 1 = BH1750 | bit 2 = SCD41
  # bit 3 = SGP41  | bit 4 = LD2410 | bit 5 = PIR
  # Internal — decoded by binary_sensors below.
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Validity Mask"
    id: ${s_name}_valid_mask
    register_type: read
    address: 9
    value_type: U_WORD
    internal: true     
    
# ──────────────────────────────────────────────────────────────
#  DISCRETE INPUTS — FC02 (read only)
# ──────────────────────────────────────────────────────────────
binary_sensor:

  # ── PIR ───────────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} PIR Movement"
    id: ${s_name}_pir
    register_type: discrete_input
    address: 0
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/PIR Movement/state"
          payload: "ON"
          retain: true
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/PIR Movement/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 9

  # ── Presence (LD2410) ─────────────────────────────────────
