    id: ${s_name}_still
    register_type: discrete_input
    address: 3
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Static Presence/state"
          payload: "ON"
          retain: true
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Static Presence/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 12

  # ── CO2 Alarm ─────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} CO2 Alarm"
    id: ${s_name}_alarm_co2
    register_type: discrete_input
    address: 4
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/CO2 Alarm/state"
          payload: "ON"
          retain: true
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/CO2 Alarm/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 13

  # ── VOC Alarm ─────────────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} VOC Alarm"
    id: ${s_name}_alarm_voc
    register_type: discrete_input
    address: 5
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/VOC Alarm/state"
          payload: "ON"
          retain: true
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/VOC Alarm/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 14

  # ── Temperature Alarm ─────────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: ${s_controller_id}
    name: "${s_name_upper} Temperature Alarm"
    id: ${s_name}_alarm_temp
    register_type: discrete_input
    address: 6
    on_press:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Alarm Temperature/state"
          payload: "ON"
          retain: true
    on_release:
      - mqtt.publish:
          topic: "${mqtt_name}/${s_name_upper} sensor/Alarm Temperature/state"
          payload: "OFF"
          retain: true
    web_server:
      sorting_group_id: ${s_name}
      sorting_weight: 15

  # ── Active Alarm ──────────────────────────────────────────
